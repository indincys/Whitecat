name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      CLANG_MODULE_CACHE_PATH: /tmp/whitecat-clang-module-cache
      SWIFTPM_MODULECACHE_OVERRIDE: /tmp/whitecat-swiftpm-module-cache
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Validate release secrets
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          TEAM_BUNDLE_PREFIX: ${{ secrets.TEAM_BUNDLE_PREFIX }}
        run: |
          required=(
            APPLE_DEVELOPER_IDENTITY
            MACOS_CERTIFICATE_P12_BASE64
            MACOS_CERTIFICATE_PASSWORD
            APPLE_NOTARY_APPLE_ID
            APPLE_NOTARY_TEAM_ID
            APPLE_NOTARY_APP_SPECIFIC_PASSWORD
            SPARKLE_PUBLIC_ED_KEY
            SPARKLE_PRIVATE_ED_KEY
            TEAM_BUNDLE_PREFIX
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/build-cert.p12
          security import /tmp/build-cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Render entitlements
        env:
          TEAM_BUNDLE_PREFIX: ${{ secrets.TEAM_BUNDLE_PREFIX }}
        run: ./Scripts/render_entitlements.sh

      - name: Run tests
        run: swift test --disable-sandbox --scratch-path /tmp/whitecat-build

      - name: Package app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          APPCAST_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ENTITLEMENTS_PATH: Configs/Whitecat.entitlements
        run: ./Scripts/package_app.sh

      - name: Verify packaged update metadata
        env:
          EXPECTED_FEED_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
          EXPECTED_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          INFO_PLIST="dist/Whitecat.app/Contents/Info.plist"
          actual_feed_url="$(plutil -extract SUFeedURL raw -o - "$INFO_PLIST")"
          actual_public_key="$(plutil -extract SUPublicEDKey raw -o - "$INFO_PLIST")"

          [[ "$actual_feed_url" == "$EXPECTED_FEED_URL" ]]
          [[ "$actual_public_key" == "$EXPECTED_PUBLIC_KEY" ]]

      - name: Notarize ZIP
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          ZIP_PATH="dist/releases/Whitecat-${VERSION}.zip"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Staple app and rebuild archives
        run: |
          xcrun stapler staple dist/Whitecat.app
          ./Scripts/archive_app.sh

      - name: Notarize and staple DMG
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_PATH="dist/releases/Whitecat-${VERSION}.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Generate appcast
        env:
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          FULL_RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: ./Scripts/generate_appcast.sh dist/releases

      - name: Verify generated appcast
        run: |
          APPCAST_PATH="dist/releases/appcast.xml"
          grep -q "<sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>" "$APPCAST_PATH"
          grep -q "releases/download/${GITHUB_REF_NAME}/Whitecat-${VERSION}.zip" "$APPCAST_PATH"
          grep -q "sparkle:edSignature=" "$APPCAST_PATH"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/releases/Whitecat-${{ env.VERSION }}.zip
            dist/releases/Whitecat-${{ env.VERSION }}.dmg
            dist/releases/appcast.xml

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist/site
          cp dist/releases/appcast.xml dist/site/appcast.xml
          if [[ -f docs/index.html ]]; then
            cp docs/index.html dist/site/index.html
          else
            printf '<!doctype html><html><body><p>Whitecat appcast</p></body></html>' > dist/site/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
